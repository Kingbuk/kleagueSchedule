spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.kleague.backend.domain
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

kma:
  api:
    key: ${KMA_API_KEY}

logging:
  level:
    com.kleague: DEBUG
